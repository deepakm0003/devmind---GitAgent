spec_version: "0.1.0"
name: devmind
version: 1.0.0
description: "The agent that interviews your codebase, writes in its voice, and evolves with every commit."

model:
  preferred: anthropic:claude-sonnet-4-5-20250929

skills:
  - interview-project
  - build-mental-model
  - write-feature
  - challenge-decision
  - negotiate-contract
  - detect-drift
  - burnout-radar
  - heal-memory

agents:
  reviewer:
    description: "Reviews code written by devmind against MEMORY.md and conventions. Checks for belonging, not correctness."
    delegation:
      mode: auto
      triggers:
        - post_write_feature
  memory-curator:
    description: "Performs consistency pass on MEMORY.md after heal-memory runs."
    delegation:
      mode: explicit

delegation:
  mode: auto

runtime:
  max_turns: 80
  timeout: 300

tags:
  - hackathon
  - developer-experience
  - memory
  - git-native
  - codebase-intelligence

metadata:
  hooks_config: hooks/hooks.yaml
  burnout_radar: private
  memory_path: memory/MEMORY.md
  knowledge_path: knowledge/