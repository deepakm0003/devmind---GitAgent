hooks:
  on_session_start:
    - script: scripts/load-memory.sh
      description: "Reads MEMORY.md into context and logs session start. Runs before any skill is invoked."
      timeout: 10
      fail_open: true

  pre_tool_use:
    - script: scripts/guard-memory.sh
      description: "Blocks any direct MEMORY.md write not originating from interview-project or heal-memory. Enforces role SOD."
      timeout: 5
      fail_open: false

  post_response:
    - script: scripts/commit-memory.sh
      description: "If MEMORY.md was modified this session, auto-commits with structured message including date and entry count."
      timeout: 15
      fail_open: true

  on_error:
    - script: scripts/escalate.sh
      description: "Logs error to memory/errors.md and surfaces a developer-friendly summary in the active session."
      timeout: 10
      fail_open: true